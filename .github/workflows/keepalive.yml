name: Keep Render Alive

# Pings the deployed app every 10 minutes so Render's free tier
# (which spins down after 15 min of inactivity) stays warm and the
# in-memory game session is not lost.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}      # allows manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS "${{ secrets.RENDER_URL }}/api/health" \
            && echo "keep-alive OK" \
            || echo "keep-alive ping failed (instance may be waking up)"
